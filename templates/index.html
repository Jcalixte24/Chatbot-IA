<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant IA Institut</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header>
    <div class="logo-box">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <div class="header-info">
      <h1>Assistant IA Institut</h1>
      <p>Formations · Admissions · Debouches</p>
    </div>
    <span class="pill">Ia Institut</span>
  </header>

  <div id="chat-container">
    <div id="inner">
      <div id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        </div>
        <h2>Bonjour, comment puis-je vous aider ?</h2>
        <p>Je reponds a toutes vos questions sur les programmes, admissions et debouches de l'IA Institut.</p>
        <div id="suggestions">
          <button class="chip" data-q="Quels programmes sont disponibles ?">Les programmes</button>
          <button class="chip" data-q="Comment candidater a l'ecole ?">Comment candidater</button>
          <button class="chip" data-q="Quels sont les debouches apres la formation ?">Les debouches</button>
          <button class="chip" data-q="Qu'est-ce que l'IA Institut ?">L'ecole</button>
          <button class="chip" data-q="Y a-t-il des bourses disponibles ?">Bourses</button>
        </div>
      </div>
    </div>
  </div>

  <div id="input-bar">
    <div id="input-box">
      <textarea id="user-input" placeholder="Posez votre question..." rows="1"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="hint">Entree pour envoyer &nbsp;&middot;&nbsp; Maj+Entree pour saut de ligne</p>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
